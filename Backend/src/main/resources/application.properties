spring.application.name=vulnix

# PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/medianet_db
spring.datasource.username=postgres
spring.datasource.password=Karim123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.sql.init.mode=always

# Server
server.port=8080

# Vulnix Scanner Config
vulnix.results.base-dir=C:/Users/user/Desktop/medianet/scan-results
vulnix.docker.image=medianet-kali-scanner:v3
# Persistent cache for OWASP Dependency-Check NVD database (downloaded on first scan, reused after)
vulnix.dc.cache.dir=C:/Users/user/.vulnix-dc-cache

# NVD API (https://nvd.nist.gov/developers/request-an-api-key)
nvd.api.key=29c62c20-41fb-4d1c-a023-be81c97c09bb

# Exploit-DB (cache local du CSV officiel, rechargé toutes les 72 h)
exploitdb.csv.local-path=C:/Users/user/Desktop/medianet/exploitdb-cache.csv

# CISA KEV (catalogue Known Exploited Vulnerabilities, rechargé toutes les 24 h)
cisa.kev.local-path=C:/Users/user/Desktop/medianet/cisa-kev-cache.json

# Traduction automatique EN→FR via MyMemory (gratuit)
